name: CI

on:
    push:
    pull_request:
    release:
        types: [published]

permissions:
    contents: write
    pull-requests: write
    id-token: write

jobs:
    build-frontend:
        name: Build Frontend
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: packages/django_hstore_widget
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v6
              with:
                  node-version: latest
            - run: npm ci
            - run: npm run build
            - run: npm run typecheck
            - uses: actions/upload-artifact@v7
              with:
                  name: workspace
                  path: packages/django_hstore_widget/
                  retention-days: 1

    test-frontend:
        name: Test Frontend
        needs: build-frontend
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: packages/django_hstore_widget
        steps:
            - uses: actions/checkout@v7
            - uses: actions/download-artifact@v8
              with:
                  name: workspace
                  path: packages/django_hstore_widget/
            - uses: actions/setup-node@v6
              with:
                  node-version: latest
            - run: npm ci
            - name: Install Playwright browsers
              run: npx playwright install --with-deps firefox
            - name: Run Vitest browser tests
              run: npm test

    test-widget-backend:
        name: Test Widget Backend
        needs: build-frontend
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: packages/django_hstore_widget
        strategy:
            matrix:
                python-version: ['3.10', '3.11', '3.12', '3.13', '3.14', 'pypy-3.10', 'pypy-3.11']
                postgres-version: ['14', '15', '16', '17', '18']
        services:
            database:
                image: postgres:${{ matrix.postgres-version }}
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: postgres
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U postgres"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        env:
            DJANGO_DATABASE_HOST: localhost
            DJANGO_DATABASE_USER: postgres
            DJANGO_DATABASE_PASSWORD: postgres
            DJANGO_DATABASE_NAME: postgres

        steps:
            - uses: actions/checkout@v7
            - uses: actions/download-artifact@v8
              with:
                  name: workspace
                  path: packages/django_hstore_widget/
            - name: Set up Python (uv)
              uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true
                  python-version: ${{ matrix.python-version }}
                  cache-dependency-glob: 'uv.lock'
            - name: Install dependencies
              run: uv sync --group test
            - name: Install Playwright browser (Chromium)
              run: uv run playwright install --with-deps chromium
            - name: Run widget backend tests
              run: uv run pytest tests/ -v -x -rs

    test-field-backend:
        name: Test Field Backend
        needs: build-frontend
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: packages/django_hstore_field
        strategy:
            matrix:
                python-version: ['3.10', '3.11', '3.12', '3.13', '3.14', 'pypy-3.10', 'pypy-3.11']
                postgres-version: ['14', '15', '16', '17', '18']
        services:
            database:
                image: postgres:${{ matrix.postgres-version }}
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: postgres
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U postgres"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        env:
            DJANGO_DATABASE_HOST: localhost
            DJANGO_DATABASE_USER: postgres
            DJANGO_DATABASE_PASSWORD: postgres
            DJANGO_DATABASE_NAME: postgres

        steps:
            - uses: actions/checkout@v7
            - uses: actions/download-artifact@v8
              with:
                  name: workspace
                  path: packages/django_hstore_widget/
            - name: Set up Python (uv)
              uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true
                  python-version: ${{ matrix.python-version }}
                  cache-dependency-glob: 'uv.lock'
            - name: Install dependencies
              run: uv sync --group test
            - name: Install Playwright browser (Chromium)
              run: uv run playwright install --with-deps chromium
            - name: Run field backend tests
              run: uv run pytest tests/ -v -x -rs

    merge:
          name: Auto-merge Dependabot
          runs-on: ubuntu-latest
          needs: [test-frontend, test-widget-backend, test-field-backend]
          if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
          concurrency:
            group: merge
        
          steps:
            - uses: actions/checkout@v7
        
            - name: Debug PR URL
              run: echo "$PR_URL"
              env:
                PR_URL: ${{ github.event.pull_request.html_url }}
        
            - name: Enable auto-merge
              run: gh pr merge --auto --merge "$PR_URL"
              env:
                PR_URL: ${{ github.event.pull_request.html_url }}
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    wait-for-ci:
        name: Wait for CI to pass
        runs-on: ubuntu-latest
        if: github.event_name == 'release'
        steps:
            - name: Check CI status for tagged commit
              uses: nick-fields/retry@v4
              with:
                max_attempts: 30
                timeout_minutes: 60
                retry_wait_seconds: 120
                command: |
                  gh api repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs \
                    --jq '
                      .check_runs[] | select(.name | test("CI")) |
                      "\(.name) \(.conclusion)"
                    '
                  CI_STATUS=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs \
                    --jq '
                      [.check_runs[] | select(.name | test("CI")) | .conclusion] |
                      all(. == "success" or . == "skipped")
                    ')
                  if [ "$CI_STATUS" = "true" ]; then
                    echo "All CI checks passed"
                    exit 0
                  else
                    echo "CI checks not yet passed or failed"
                    exit 1
                  fi
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    release:
        name: Release packages
        needs: wait-for-ci
        runs-on: ubuntu-latest
        if: github.event_name == 'release'
        environment:
            name: pypi
            url: https://pypi.org/project/django-hstore-widget
        steps:
            - uses: actions/checkout@v7
              with:
                fetch-depth: 0
                token: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up uv
              uses: astral-sh/setup-uv@v7
              with:
                enable-cache: true
                python-version: "3.13"

            - name: Extract version from release tag
              id: version
              run: |
                VERSION="${GITHUB_REF_NAME#v}"
                echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

            - name: Update pyproject.toml versions
              run: |
                uv run python scripts/sync_release.py "widget-${{ steps.version.outputs.version }}"
                uv run python scripts/sync_release.py "field-${{ steps.version.outputs.version }}"

            - name: Update CHANGELOG.md
              run: uv run python scripts/sync_changelog.py

            - name: Commit version & changelog updates
              run: |
                git config user.name "github-actions[bot]"
                git config user.email "github-actions[bot]@users.noreply.github.com"
                git add \
                  packages/django_hstore_widget/pyproject.toml \
                  packages/django_hstore_widget/src/django_hstore_widget/__init__.py \
                  packages/django_hstore_field/pyproject.toml \
                  packages/django_hstore_field/src/django_hstore_field/__init__.py \
                  CHANGELOG.md
                git diff --cached --quiet && exit 0
                git commit -m "chore: sync versions and changelog for release ${{ steps.version.outputs.version }}"
                git push origin HEAD:master

            - name: Build widget package
              run: |
                uv build --package django-hstore-widget --no-sources \
                  --out-dir packages/django_hstore_widget/py-dist --clear

            - name: Build field package
              run: |
                uv build --package django-hstore-field --no-sources \
                  --out-dir packages/django_hstore_field/py-dist --clear

            - name: Publish widget to PyPI
              run: uv publish --trusted-publishing always packages/django_hstore_widget/py-dist/*

            - name: Publish field to PyPI
              run: uv publish --trusted-publishing always packages/django_hstore_field/py-dist/*

