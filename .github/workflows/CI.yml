name: CI

on: [push, pull_request]

permissions:
    contents: write
    pull-requests: write

jobs:
    build-frontend:
        name: Build Frontend
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: packages/django_hstore_widget
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v6
              with:
                  node-version: latest
            - run: npm ci
            - run: npm run build
            - run: npm run typecheck
            - uses: actions/upload-artifact@v7
              with:
                  name: workspace
                  path: packages/django_hstore_widget/
                  retention-days: 1

    test-frontend:
        name: Test Frontend
        needs: build-frontend
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: packages/django_hstore_widget
        steps:
            - uses: actions/checkout@v7
            - uses: actions/download-artifact@v8
              with:
                  name: workspace
                  path: packages/django_hstore_widget/
            - uses: actions/setup-node@v6
              with:
                  node-version: latest
            - run: npm ci
            - name: Install Playwright browsers
              run: npx playwright install --with-deps firefox
            - name: Run Vitest browser tests
              run: npm test

    test-widget-backend:
        name: Test Widget Backend
        needs: build-frontend
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: packages/django_hstore_widget
        strategy:
            matrix:
                python-version: ['3.10', '3.11', '3.12', '3.13', '3.14', 'pypy-3.10', 'pypy-3.11']
                postgres-version: ['14', '15', '16', '17', '18']
        services:
            database:
                image: postgres:${{ matrix.postgres-version }}
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: postgres
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U postgres"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        env:
            DJANGO_DATABASE_HOST: localhost
            DJANGO_DATABASE_USER: postgres
            DJANGO_DATABASE_PASSWORD: postgres
            DJANGO_DATABASE_NAME: postgres

        steps:
            - uses: actions/checkout@v7
            - uses: actions/download-artifact@v8
              with:
                  name: workspace
                  path: packages/django_hstore_widget/
            - name: Set up Python (uv)
              uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true
                  python-version: ${{ matrix.python-version }}
                  cache-dependency-glob: 'uv.lock'
            - name: Install dependencies
              run: uv sync --group test
            - name: Install Playwright browser (Chromium)
              run: uv run playwright install --with-deps chromium
            - name: Run widget backend tests
              run: uv run pytest tests/ -v -x -rs

    test-field-backend:
        name: Test Field Backend
        needs: build-frontend
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: packages/django_hstore_field
        strategy:
            matrix:
                python-version: ['3.10', '3.11', '3.12', '3.13', '3.14', 'pypy-3.10', 'pypy-3.11']
                postgres-version: ['14', '15', '16', '17', '18']
        services:
            database:
                image: postgres:${{ matrix.postgres-version }}
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: postgres
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U postgres"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        env:
            DJANGO_DATABASE_HOST: localhost
            DJANGO_DATABASE_USER: postgres
            DJANGO_DATABASE_PASSWORD: postgres
            DJANGO_DATABASE_NAME: postgres

        steps:
            - uses: actions/checkout@v7
            - uses: actions/download-artifact@v8
              with:
                  name: workspace
                  path: packages/django_hstore_widget/
            - name: Set up Python (uv)
              uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true
                  python-version: ${{ matrix.python-version }}
                  cache-dependency-glob: 'uv.lock'
            - name: Install dependencies
              run: uv sync --group test
            - name: Install Playwright browser (Chromium)
              run: uv run playwright install --with-deps chromium
            - name: Run field backend tests
              run: uv run pytest tests/ -v -x -rs

    merge:
          name: Auto-merge Dependabot
          runs-on: ubuntu-latest
          needs: [test-frontend, test-widget-backend, test-field-backend]
          if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
          concurrency:
            group: merge
        
          steps:
            - uses: actions/checkout@v7
        
            - name: Debug PR URL
              run: echo "$PR_URL"
              env:
                PR_URL: ${{ github.event.pull_request.html_url }}
        
            - name: Enable auto-merge
              run: gh pr merge --auto --merge "$PR_URL"
              env:
                PR_URL: ${{ github.event.pull_request.html_url }}
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

