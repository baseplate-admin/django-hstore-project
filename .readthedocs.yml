version: 2

build:
    os: ubuntu-24.04
    tools:
        python: "3.14"
        nodejs: "22"

sphinx:
    configuration: apps/docs/conf.py
    builder: html
    fail_on_warning: false

jobs:
    install:
        - cd packages/django_hstore_widget && npm ci
    post_install:
        - pip install uv
        - UV_PROJECT_ENVIRONMENT=$READTHEDOCS_VIRTUALENV_PATH uv sync --group docs
    pre_build:
        - cd packages/django_hstore_widget && npm run build
        - mkdir -p apps/docs/static/
        - cp -r packages/django_hstore_widget/src/django_hstore_widget/static/admin/js/django_hstore_widget/* apps/docs/static/
